<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Navbar Design - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fafbfd 0%, #f5f7fb 100%);
            background-attachment: fixed;
            color: #1a2332;
        }

        /* NAVBAR - Modern Premium Style */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 100px;
        }

        .nav-links {
            display: flex;
            gap: 0;
            list-style: none;
            flex: 1;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.8rem 1.3rem;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #1a2332;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0.4rem;
            left: 1.3rem;
            right: 1.3rem;
            height: 2px;
            background: #4f46e5;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0.65rem 1.6rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: #3d35b7;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.2);
        }

        /* Content for demo */
        .demo-content {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            text-align: center;
        }

        .demo-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #0f172a;
        }

        .demo-content p {
            font-size: 1.1rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 0.5rem;
            }

            .nav-links a {
                padding: 0.6rem 0.8rem;
                font-size: 0.85rem;
            }

            .nav-links a::after {
                left: 0.8rem;
                right: 0.8rem;
            }

            .btn-primary {
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Modern Premium Navbar -->
    <nav>
        <div class="nav-container">
            <div class="logo">xalora</div>
            <ul class="nav-links">
                <li><a href="#features">Features</a></li>
                <li><a href="#pricing">Pricing</a></li>
                <li><a href="#docs">Docs</a></li>
                <li><a href="#about">About</a></li>
            </ul>
            <button class="btn-primary">Get Started</button>
        </div>
    </nav>

    <div class="demo-content">
        <h1>Modern Premium Navbar Design</h1>
        <p>Clean, minimal, elegant. Inspired by Vercel, Linear, Stripe. Perfect for SaaS & learning platforms.</p>
    </div>
</body>
</html>
